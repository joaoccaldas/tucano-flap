<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Tucano Flap - Brazilian Flappy Bird for TV">
  <title>Tucano Flap 🇧🇷</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    body { display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
    #game-container { position: relative; width: 100%; height: 100%; max-width: 1920px; max-height: 1080px; aspect-ratio: 16 / 9; overflow: hidden; border-radius: 28px; }
    canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; image-rendering: crisp-edges; outline: none; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .tv-focus { outline: 4px solid #00ff88; outline-offset: -4px; }
    #landing-screen {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background:
        radial-gradient(circle at 75% 20%, rgba(255, 223, 0, 0.25), transparent 28%),
        linear-gradient(180deg, rgba(255,107,107,0.92) 0%, rgba(254,202,87,0.9) 48%, rgba(72,219,251,0.88) 100%);
      transition: opacity 200ms ease;
    }
    #landing-screen.hidden { opacity: 0; pointer-events: none; }
    .menu-card {
      width: min(90vw, 720px);
      background: rgba(15, 23, 42, 0.84);
      color: white;
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.35);
      padding: 36px;
      backdrop-filter: blur(10px);
    }
    .menu-title { font-size: clamp(36px, 5vw, 64px); color: #00ff88; margin-bottom: 12px; }
    .menu-subtitle { font-size: clamp(16px, 2.2vw, 24px); line-height: 1.5; color: rgba(255,255,255,0.9); margin-bottom: 28px; }
    .menu-label { display: block; font-size: 18px; margin-bottom: 10px; color: #ffe66d; }
    .menu-input {
      width: 100%;
      padding: 18px 20px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 24px;
      font-family: inherit;
      margin-bottom: 18px;
    }
    .menu-input:focus { outline: none; border-color: #00ff88; box-shadow: 0 0 0 4px rgba(0,255,136,0.18); }
    .menu-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between; }
    .menu-button {
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #009C3B, #00c851);
      color: white;
      padding: 18px 28px;
      font-size: 24px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(0, 156, 59, 0.35);
    }
    .menu-note { font-size: 16px; color: rgba(255,255,255,0.75); }
    .menu-player { color: #ffe66d; }
    .menu-select {
      width: 100%;
      padding: 18px 20px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 22px;
      font-family: inherit;
      margin-bottom: 22px;
    }
  </style>
  <script type="module" crossorigin src="./bundle.js"></script>
</head>
<body>
  <div id="game-container">
    <div id="landing-screen">
      <div class="menu-card">
        <div class="menu-title">TUCANO FLAP 🇧🇷</div>
        <div class="menu-subtitle">A colorful Brazil-themed landing page for TV and mobile. Choose your player name, your Brazil animal hero, and your difficulty, then start the flight. Current hero: <span id="menu-name" class="menu-player">Nono Caldas</span> with <span id="menu-animal" class="menu-player">tucano</span> on <span id="menu-difficulty" class="menu-player">easy</span>.</div>
        <label class="menu-label" for="player-name">Player name</label>
        <input id="player-name" class="menu-input" type="text" maxlength="24" value="Nono Caldas" autocomplete="off" />
        <label class="menu-label" for="animal-select">Animal sprite</label>
        <select id="animal-select" class="menu-select">
          <option value="tucano">Tucano</option>
          <option value="arara">Arara</option>
          <option value="capivara">Capivara</option>
          <option value="jaguar">Jaguar</option>
          <option value="jow">Jow 🐦</option>
          <option value="thais">Thais 🦅</option>
        </select>
        <label class="menu-label" for="difficulty-select">Difficulty</label>
        <select id="difficulty-select" class="menu-select">
          <option value="easy">TV Easy</option>
          <option value="normal">Normal</option>
          <option value="chaos">Chaos</option>
        </select>
        <div class="menu-row">
          <button id="start-game" class="menu-button">Start game</button>
          <div class="menu-note">Press Enter / OK on TV remote to continue</div>
        </div>
      </div>
    </div>
    <canvas id="game-canvas" tabindex="0"></canvas>
    <div id="ui-layer"></div>
  </div>
</body>
</html>
